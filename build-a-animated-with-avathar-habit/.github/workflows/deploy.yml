name: Node.js CD

on:
  push:
    branches: [ "main" ]

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
    
    - name: Build and push Server image
      run: |
        cd server
        docker build -t kruthik055/streakmaster-server:latest .
        docker push kruthik055/streakmaster-server:latest
    
    - name: Build and push Client image
      run: |
        cd client
        docker build -t kruthik055/streakmaster-client:latest .
        docker push kruthik055/streakmaster-client:latest