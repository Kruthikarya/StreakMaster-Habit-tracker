name: Node.js CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - run: docker build . -t kruthik055/streakmaster-habit-tracker
      - run: docker push kruthik055/streakmaster-habit-tracker:latest
